name: Build Check

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Next.js build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
